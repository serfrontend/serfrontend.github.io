    <meta charset="UTF-8">

    <title>Muitas ofertas no Esquenta da Black Friday da Amazon. Aproveitem!</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {
            background-color: #f5f5f5;
            text-align: center;
            padding: 3rem 2%;
            font-family: "Inter", sans-serif;
        }

        h1 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(17.5rem, 1fr));
            gap: 1.5rem;
            max-width: 60rem;
            margin: auto;
        }

        .card {
            background: #fff;
            padding: 1rem;
            border-radius: .5rem;
            box-shadow: 0 .25rem .5rem rgba(0, 0, 0, 0.1);
            text-align: left;
            display: flex;
            flex-direction: column;
            align-items: start;
        }

        .card img {
            width: 100%;
            display: block;
            aspect-ratio: 1;
            object-fit: contain;
        }

        .card h2 {
            font-size: 1.25rem;
            margin: .5rem 0;
            color: #222;
        }

        .card p {
            font-size: 1rem;
            color: #555;
            margin-bottom: 1rem;
        }

        .card a {
            display: inline-block;
            text-decoration: none;
            background: #ff9900;
            color: #fff;
            padding: 1rem;
            border-radius: .25rem;
            font-weight: bold;
            margin-block: auto 0;
        }

        .card a:hover {
            background: #e68900;
        }

        .link-amz-mais-produtos {
            text-decoration: none;
            color: #fff;
            padding: 1rem;
            border-radius: .25rem;
            font-weight: bold;
            margin-block: 1rem;
            grid-column: 1 / -1;
            align-items: center;
        }
    </style>
</head>
